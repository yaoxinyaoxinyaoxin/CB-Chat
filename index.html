<body>

<header class="site-header">
  <h1 id="dynamic-title"><span>CB-Chat</span> · Controllable Bayesian Chat</h1>
  <p class="subtitle">人人都是贝叶斯 · Everyone is a Bayesian</p>
  <div class="lang-switcher">
    <button id="btn-cn" class="active" onclick="switchLang('cn')">中文</button>
    <button id="btn-en" onclick="switchLang('en')">English</button>
  </div>
  <div class="status-badge">
    <span id="status-dot" class="status-dot loading"></span>
    <span id="status-text">Loading...</span>
  </div>
</header>

<div class="content-wrapper">
  <main id="content">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </main>
</div>

<footer class="site-footer">
  <p>
    <a href="https://github.com/yaoxinyaoxinyaoxin/CB-Chat">GitHub</a>
    &nbsp;·&nbsp; MIT License
    &nbsp;·&nbsp; <a href="https://github.com/yaoxinyaoxinyaoxin/CB-Chat/issues">Issues</a>
  </p>
</footer>

<script>
  const CN_FILE = 'CB-Chat_CN.md';
  const EN_FILE = 'CB-Chat_EN.md';
  const CN_TITLE = 'CB-Chat · Controllable Bayesian Chat';
  const EN_TITLE = 'CB-Chat · Controllable Bayesian Chat';

  let currentLang = 'cn';
  let cached = { cn: null, en: null };

  function $(id) { return document.getElementById(id); }

  function updateStatus(loading, text) {
    const dot = $('status-dot');
    const label = $('status-text');
    dot.className = 'status-dot' + (loading ? ' loading' : '');
    label.textContent = text;
  }

  async function loadMarkdown(lang) {
    if (cached[lang]) return cached[lang];
    const file = lang === 'cn' ? CN_FILE : EN_FILE;
    const resp = await fetch(file);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    cached[lang] = text;
    return text;
  }

  function renderMarkdown(md) {
    let html = md;
    // Fenced code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      '<pre><code>' + esc(code.trimEnd()) + '</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold + italic
    html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Images
    html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
    // Links
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
    // HR
    html = html.replace(/^---+$/gm, '<hr>');
    // Blockquotes
    html = html.replace(/(^> .+(\n> .+)*)/gm, m => {
      const lines = m.split('\n').map(l => l.replace(/^> ?/, ''));
      return '<blockquote>' + lines.join('\n') + '</blockquote>';
    });
    // Headings
    html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
    // Tables
    html = html.replace(/(^\|.+\|$\n^\|[-|\s:]+\|$\n(?:^\|.+\|$\n?)*)/gm, table => {
      const rows = table.trim().split('\n');
      let r = '<table><thead><tr>';
      rows[0].split('|').filter(c => c.trim()).forEach(c => r += '<th>' + c.trim() + '</th>');
      r += '</tr></thead><tbody>';
      for (let i = 2; i < rows.length; i++) {
        r += '<tr>';
        rows[i].split('|').filter(c => c.trim()).forEach(c => r += '<td>' + c.trim() + '</td>');
        r += '</tr>';
      }
      return r + '</tbody></table>';
    });
    // Lists
    html = html.replace(/((?:^- .+\n?)+)/gm, list => {
      const items = list.trim().split('\n').map(l => '<li>' + l.replace(/^- /, '') + '</li>');
      return '<ul>' + items.join('') + '</ul>';
    });
    html = html.replace(/((?:^\d+\. .+\n?)+)/gm, list => {
      const items = list.trim().split('\n').map(l => '<li>' + l.replace(/^\d+\. /, '') + '</li>');
      return '<ol>' + items.join('') + '</ol>';
    });
    // Bug: numbered list items inside <details> - keep untouched via a simpler pass
    // Convert <details>/<summary> to HTML
    html = html.replace(/<details>/g, '<details>');
    html = html.replace(/<\/details>/g, '</details>');
    html = html.replace(/<summary>/g, '<summary>');
    html = html.replace(/<\/summary>/g, '</summary>');
    // Paragraphs
    const lines = html.split('\n');
    let result = [], para = [];
    function flush() { if (para.length) { result.push('<p>' + para.join(' ') + '</p>'); para = []; } }
    for (let line of lines) {
      const t = line.trim();
      if (!t) { flush(); result.push(''); continue; }
      if (/^<(h[1-6]|table|thead|tbody|tr|th|td|ul|ol|li|blockquote|pre|hr|img|p|div|details|summary)/.test(t) || /^<\/(table|ul|ol|blockquote|pre|div|details)>/.test(t)) {
        flush(); result.push(t); continue;
      }
      para.push(t);
    }
    flush();
    return result.join('\n');
  }

  function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function updateButtons(lang) {
    $('btn-cn').className = lang === 'cn' ? 'active' : '';
    $('btn-en').className = lang === 'en' ? 'active' : '';
  }

  async function switchLang(lang) {
    if (lang === currentLang && cached[lang]) return;
    currentLang = lang;
    updateButtons(lang);
    $('content').innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';
    updateStatus(true, lang === 'cn' ? '加载中文版...' : 'Loading English...');
    window.location.hash = lang;

    try {
      const md = await loadMarkdown(lang);
      const html = renderMarkdown(md);
      $('content').innerHTML = html;
      updateStatus(false, (lang === 'cn' ? '中文版' : 'English') + ' · ' + new Date().toLocaleDateString());
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } catch (err) {
      $('content').innerHTML = '<p style="color:#f85149;text-align:center;padding:3rem 0;">Failed to load: ' + err.message + '</p>';
      updateStatus(false, 'Error');
    }
  }

  (function() {
    const hash = window.location.hash.replace('#', '');
    const lang = (hash === 'en') ? 'en' : 'cn';
    switchLang(lang);
  })();
</script>

</body>
